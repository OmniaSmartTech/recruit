version: "3.8"

services:
  backend:
    image: recruitsmart-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitsmart-backend
    ports:
      - "4080:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AIONE_AUTH_JWT_SECRET=${AIONE_AUTH_JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - PORT=5000
    restart: unless-stopped

  frontend:
    image: recruitsmart-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: recruitsmart-frontend
    ports:
      - "4082:80"
    depends_on:
      - backend
    restart: unless-stopped
